version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: greenhouse-postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=greenhouse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: greenhouse-rabbitmq
    ports:
      - "5672:5672"   # Port Applicatif
      - "15672:15672" # Port Tableau de bord Web
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

volumes:
  postgres-data: